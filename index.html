<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>♞ Pitch Black — Anonymous Chat</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E♞%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ LANDING SCREEN ============ -->
  <section id="landing" class="screen active">
    <div class="brand">
      <div class="logo">♞</div>
      <h1>Pitch Black</h1>
      <p class="tagline">Anonymous. Encrypted. Ephemeral.</p>
    </div>

    <div class="card">
      <label for="roomInput">Room Code</label>
      <input id="roomInput" type="text" placeholder="e.g. midnight-42" autocomplete="off" spellcheck="false" />
      <button id="joinBtn" class="btn btn-primary">Join Room</button>
      
      <div class="divider"><span>or</span></div>
      
      <button id="createBtn" class="btn btn-secondary">Create New Room</button>
    </div>

    <footer class="foot">No accounts. No traces. Just talk.</footer>
  </section>

  <!-- ============ CHAT SCREEN ============ -->
  <section id="chat" class="screen">
    <header class="chat-header">
      <div class="room-info">
        <h2 id="roomName">Room</h2>
        <span class="status-online"><span id="onlineCount">0</span> online</span>
      </div>
      <div class="chat-actions">
        <button id="callBtn" class="icon-btn" title="Audio Call">📞</button>
        <button id="videoBtn" class="icon-btn" title="Video Call">🎥</button>
        <button id="copyLinkBtn" class="icon-btn" title="Copy Invite Link">🔗</button>
        <button id="leaveBtn" class="icon-btn" title="Leave Room">⏻</button>
      </div>
    </header>

    <main class="messages" id="messages"></main>
    <div id="typingIndicator" class="typing-indicator"></div>

    <!-- Call Overlay -->
    <div id="callOverlay" class="call-overlay hidden">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="call-controls">
        <button id="muteBtn" class="call-btn">🎤</button>
        <button id="camBtn" class="call-btn">📹</button>
        <button id="hangupBtn" class="call-btn danger">📴</button>
      </div>
    </div>

    <!-- Composer -->
    <footer class="composer">
      <button id="emojiBtn" class="icon-btn sm" title="Emoji">😊</button>
      <button id="attachBtn" class="icon-btn sm" title="Attach File">📎</button>
      <button id="voiceBtn" class="icon-btn sm" title="Voice Note">🎙️</button>
      <input id="fileInput" type="file" accept="image/*,video/*" hidden />
      
      <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
      <button id="sendBtn" class="send-btn" title="Send">➤</button>

      <!-- Emoji Picker -->
      <div id="emojiPicker" class="emoji-picker hidden"></div>
      
      <!-- Voice Recorder UI -->
      <div id="voiceRecorder" class="voice-recorder hidden">
        <span class="rec-dot"></span>
        <span id="recTime">0:00</span>
        <button id="cancelRec" class="mini-btn">Cancel</button>
        <button id="sendRec" class="mini-btn primary">Send</button>
      </div>
    </footer>
  </section>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
